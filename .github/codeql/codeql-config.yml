name: "TideWatch CodeQL Config"

# Path filters to exclude test files from analysis
paths-ignore:
  - "**/tests/**"
  - "**/__tests__/**"
  - "**/test_*.py"
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/*.spec.ts"

# Only run security-tagged queries — filters out code quality rules
# (py/empty-except, py/mixed-returns, etc.) that are not actionable here.
# Sanitizer barriers in sanitizers.yml handle the remaining false positives
# for py/log-injection and py/path-injection.
query-filters:
  - include:
      tags contain: security

  # Stack trace exposure — false positives on intended API responses:
  # validation messages, Docker stats, hardcoded success dicts.
  # Actual exceptions use safe_error_response() (logs server-side only).
  - exclude:
      id: py/stack-trace-exposure

  # Clear-text logging — flags hostname in SSRF debug log.  Hostnames are
  # operational metadata, not secrets.  Cannot be modelled as a barrier
  # because the logged value is the hostname itself, not a sanitised form.
  - exclude:
      id: py/clear-text-logging-sensitive-data

# Sanitizer barriers in homelabforge/tidewatch-models/sanitizers.yml
# handle remaining false positives. The pack is registered via
# --additional-packs and --extension-packs in the workflow's
# CODEQL_ACTION_EXTRA_OPTIONS env var (the codeql-action packs: key
# only accepts published packs, not local paths).
