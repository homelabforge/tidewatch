name: "TideWatch CodeQL Config"

# Path filters to exclude test files from analysis
paths-ignore:
  - "**/tests/**"
  - "**/__tests__/**"
  - "**/test_*.py"
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/*.spec.ts"

# Query filters — only exclude rules that genuinely produce false positives
# and cannot be resolved with sanitizer barriers
query-filters:
  # Exclude stack trace exposure — false positives flagging intended API responses:
  # - Validation error messages meant for users (e.g., "Invalid time format")
  # - Docker stats/metrics data (numeric, not sensitive)
  # - Safe result dicts with hardcoded success messages
  # Actual exception handling uses safe_error_response() which logs details
  # server-side and returns only generic messages to clients
  - exclude:
      id: py/stack-trace-exposure

  # Exclude mixed returns — safe_error_response() is typed as NoReturn
  # but CodeQL's analysis doesn't fully track this through all code paths
  - exclude:
      id: py/mixed-returns

# Register model extensions to recognize our sanitizer functions as barriers.
# This replaces blanket rule exclusions for py/log-injection and py/path-injection
# with precise per-function barrier declarations, so CodeQL still scans for those
# vulnerability classes but recognizes our custom sanitizers.
model-extensions:
  - .github/codeql/sanitizers.yml
