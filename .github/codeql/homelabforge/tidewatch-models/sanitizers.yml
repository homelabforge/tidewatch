extensions:
  # Mark our sanitizer functions as barriers (sanitizers) for taint tracking
  # so CodeQL recognises that values transiting through them are no longer
  # attacker-controlled. Functions live in backend/app/utils/security.py.
  #
  # Per CodeQL Python ModelsAsData docs:
  #   "The package name refers to the top-level module the import comes from,
  #    and not a PyPI package. So for `from foo.bar import baz`, the package
  #    will be `foo`."
  # So for `from app.utils.security import sanitize_log_message`, the package
  # is "app" and the path walks down via Member tokens. (Mirrors mygarage's
  # working setup at .github/codeql/homelabforge/mygarage-models/sanitizers.yml.)
  - addsTo:
      pack: codeql/python-all
      extensible: barrierModel
    data:
      # Log injection barriers — sanitize_log_message() strips newlines and
      # control characters (0x00-0x1f, 0x7f-0x9f) before values reach loggers
      - ["app", "Member[utils].Member[security].Member[sanitize_log_message].ReturnValue", "log-injection"]
      # mask_sensitive() replaces all but the last N chars with asterisks
      - ["app", "Member[utils].Member[security].Member[mask_sensitive].ReturnValue", "log-injection"]
      - ["app", "Member[utils].Member[security].Member[mask_sensitive].ReturnValue", "py/clear-text-logging-sensitive-data"]
      # Path injection barriers — sanitize_path() resolves to absolute path,
      # validates within base_dir, and optionally rejects symlinks
      - ["app", "Member[utils].Member[security].Member[sanitize_path].ReturnValue", "path-injection"]
      # is_safe_filename() rejects path separators, null bytes, control chars
      - ["app", "Member[utils].Member[security].Member[is_safe_filename].ReturnValue", "path-injection"]
      # validate_container_name() enforces [a-zA-Z0-9][a-zA-Z0-9_.-]* regex
      - ["app", "Member[utils].Member[security].Member[validate_container_name].ReturnValue", "path-injection"]
      # validate_image_name() rejects traversal patterns, control chars
      - ["app", "Member[utils].Member[security].Member[validate_image_name].ReturnValue", "path-injection"]
