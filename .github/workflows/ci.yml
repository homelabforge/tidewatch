name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python 3.14
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.14'
          cache: 'pip'
          cache-dependency-path: 'backend/pyproject.toml'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e backend/[dev]

      - name: Run ruff linter
        run: |
          cd backend
          ruff check .

      - name: Run ruff formatter check
        run: |
          cd backend
          ruff format --check .

      - name: Run pyright type checking
        run: |
          cd backend
          PYTHONPATH=. pyright

      - name: Check for raw Docker container queries in routes (tripwire)
        run: |
          # Temporary tripwire — catches raw Docker SDK calls that bypass
          # get_container_or_404() dependency injection in route handlers.
          # Services are exempt (internal use with validated inputs).
          # containers.py is allowed: its single .containers.get() uses
          # container.runtime_name from the DB model after get_container_or_404.
          FOUND=0
          if grep -rPn '\.containers\.(get|list|run)\(' backend/app/routes/ | grep -v 'containers.py'; then
            echo "ERROR: Found raw Docker container queries in route files."
            echo "Use get_container_or_404() instead. See: backend/app/dependencies.py"
            FOUND=1
          fi
          exit $FOUND

      - name: Run pytest with coverage
        run: |
          cd backend
          timeout 10m pytest tests/ -v --tb=short --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          files: ./backend/coverage.xml
          flags: backend

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: |
          cd frontend
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then bun install; else bun install --frozen-lockfile; fi

      - name: Run TypeScript type checking
        run: |
          cd frontend
          bun run type-check

      - name: Run linter
        run: |
          cd frontend
          bun run lint

      - name: Run tests with coverage
        run: |
          cd frontend
          bun run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          files: ./frontend/coverage/coverage-final.json
          flags: frontend

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test-backend, test-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python 3.14
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.14'
          cache: 'pip'
          cache-dependency-path: 'backend/pyproject.toml'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e backend/

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: '1.3.11'

      - name: Install frontend dependencies
        run: |
          cd frontend
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then bun install; else bun install --frozen-lockfile; fi

      - name: Install Playwright browsers
        run: |
          cd frontend
          bunx playwright install chromium --with-deps

      - name: Run E2E tests
        run: |
          cd frontend
          bun run e2e
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-results
          path: frontend/test-results/
          retention-days: 7

  api-types-freshness:
    name: API Types Freshness
    runs-on: ubuntu-latest
    needs: [test-backend]

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python 3.14
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.14'
          cache: 'pip'
          cache-dependency-path: 'backend/pyproject.toml'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e backend/

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: '1.3.11'

      - name: Install frontend dependencies
        run: |
          cd frontend
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then bun install; else bun install --frozen-lockfile; fi

      - name: Check API types freshness
        run: |
          cd frontend
          bun run check:api-freshness

  docker-build-test:
    name: Docker Build Test
    runs-on: ubuntu-latest
    env:
      BUILDKIT_PROGRESS: plain

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: false
          tags: tidewatch:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
