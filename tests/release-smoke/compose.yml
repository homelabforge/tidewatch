# End-to-end test stack for TideWatch.
# TideWatch ships SQLite-only (no asyncpg/psycopg in the image), so the
# gate exercises a single SQLite-backed instance from a freshly built image.
#
# A docker-socket-proxy sidecar is required because TideWatch's
# container_monitor singleton talks to the Docker daemon at startup.
# Mounting the host socket directly into the unprivileged app fails with
# Permission Denied; the proxy exposes the socket over TCP for the app.

services:
  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: tidewatch-release-smoke-docker-proxy
    environment:
      CONTAINERS: 1
      IMAGES: 1
      INFO: 1
      PING: 1
      VERSION: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  app:
    image: tidewatch:release-smoke
    container_name: tidewatch-release-smoke-app
    depends_on:
      - docker-proxy
    environment:
      TIDEWATCH_TESTING: "true"
      DOCKER_HOST: tcp://docker-proxy:2375
    volumes:
      - app-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8788/health"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  smoke:
    image: python:3.14-slim
    container_name: tidewatch-release-smoke-smoke
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - ./smoke.py:/smoke.py:ro
    entrypoint: ["sh", "-c", "pip install -q httpx && python /smoke.py \"$$@\"", "--"]

volumes:
  app-data:
